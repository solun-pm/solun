name: Security

on:
  schedule:
    - cron: "0 3 * * 1" # weekly Monday 03:00 UTC
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Minimal permissions (vorher: default write)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod)
        # --audit-level=high: Nur HIGH/CRITICAL schlagen den Job fehl
        # Vorher: ohne --audit-level → schlägt auch bei low/moderate fehl
        run: pnpm audit --prod --audit-level=high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Für SARIF-Upload ins GitHub Security-Tab
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.29.0  # 0.24.0 → 0.29.0 (veraltet, DB-Schema-Probleme)
        with:
          scan-type: fs
          scan-ref: .
          format: sarif          # Vorher: table → kein GitHub-Security-Tab-Integration
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # exit-code: 1 entfernt → Findings werden ins Security-Tab gepostet statt den Job zu brechen

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
